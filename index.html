<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>バブル思考ボード v0</title>
<style>
  :root{
    --night1:#0b1026; --night2:#1c1440; --night3:#241a4f;
    --ink:#e7e9f4; --ink-dim:rgba(231,233,244,.45);
    --c-none:#cdd6f4; --c-neta:#7dd3fc; --c-task:#fbbf77;
    --c-later:#c4b5fd; --c-tired:#8aa0b8; --c-imo:#e9c46a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic UI",system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(165deg,var(--night1) 0%,var(--night2) 55%,var(--night3) 100%);
  }
  /* 星 */
  .stars{position:fixed;inset:0;pointer-events:none;}
  .stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,.5);animation:twinkle 4s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.7}}

  header{
    position:fixed;top:0;left:0;right:0;z-index:20;
    display:flex;align-items:center;gap:8px;
    padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
  }
  header h1{font-size:15px;font-weight:600;letter-spacing:.06em;flex:1;}
  header h1 small{display:block;font-size:10px;font-weight:400;color:var(--ink-dim);letter-spacing:.04em;margin-top:2px;}
  .ghost{
    border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);
    color:var(--ink);font-size:12px;padding:7px 12px;border-radius:999px;
    backdrop-filter:blur(6px);cursor:pointer;
  }
  .ghost:active{background:rgba(255,255,255,.16);}

  /* ボード */
  #board{position:fixed;inset:0;z-index:5;}
  #empty{
    position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;
    gap:8px;color:var(--ink-dim);font-size:13px;line-height:2;text-align:center;pointer-events:none;z-index:4;
  }

  .bubble{
    position:absolute;max-width:46vw;padding:10px 14px;border-radius:22px;
    font-size:12.5px;line-height:1.5;color:var(--ink);
    background:rgba(255,255,255,.08);
    border:1px solid color-mix(in srgb, var(--cat) 55%, transparent);
    box-shadow:0 0 18px color-mix(in srgb, var(--cat) 22%, transparent), inset 0 0 12px rgba(255,255,255,.05);
    backdrop-filter:blur(4px);
    cursor:pointer;user-select:none;
    animation:drift var(--dur) ease-in-out var(--delay) infinite alternate;
  }
  .bubble .tag{display:block;font-size:9px;letter-spacing:.08em;color:color-mix(in srgb, var(--cat) 85%, white 10%);margin-bottom:3px;}
  .bubble.born{animation:rise .55s cubic-bezier(.2,.9,.3,1.2) forwards, drift var(--dur) ease-in-out .6s infinite alternate;}
  @keyframes rise{from{transform:translateY(38vh) scale(.4);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
  @keyframes drift{from{translate:0 0}to{translate:var(--dx) var(--dy)}}
  @media (prefers-reduced-motion: reduce){.bubble{animation:none!important}}

  /* 入力バー */
  .dock{
    position:fixed;left:0;right:0;bottom:0;z-index:20;
    padding:10px 12px calc(12px + env(safe-area-inset-bottom));
    display:flex;gap:8px;
    background:linear-gradient(to top, rgba(8,10,30,.92), rgba(8,10,30,0));
  }
  .dock input{
    flex:1;font-size:16px;padding:13px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.09);color:var(--ink);outline:none;backdrop-filter:blur(8px);
  }
  .dock input::placeholder{color:var(--ink-dim);}
  .dock button{
    font-size:14px;font-weight:600;padding:0 18px;border-radius:999px;border:none;cursor:pointer;
    background:linear-gradient(135deg,#8ab9ff,#c4b5fd);color:#101230;
  }
  .dock button:active{filter:brightness(.85);}

  /* シート */
  #dim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:30;display:none;}
  #sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:31;display:none;
    background:#171a36;border-radius:20px 20px 0 0;
    padding:18px 16px calc(20px + env(safe-area-inset-bottom));
    box-shadow:0 -8px 40px rgba(0,0,0,.5);
  }
  #sheet .full{font-size:14px;line-height:1.7;margin-bottom:6px;word-break:break-word;}
  #sheet .when{font-size:11px;color:var(--ink-dim);margin-bottom:14px;}
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .pill{
    font-size:13px;padding:9px 14px;border-radius:999px;cursor:pointer;
    border:1.5px solid color-mix(in srgb, var(--cat) 70%, transparent);
    color:color-mix(in srgb, var(--cat) 85%, white 15%);background:transparent;
  }
  .pill.on{background:color-mix(in srgb, var(--cat) 30%, transparent);color:#fff;}
  .sheet-actions{display:flex;gap:10px;}
  .sheet-actions button{flex:1;font-size:13px;padding:11px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:transparent;color:var(--ink);cursor:pointer;}
  .sheet-actions .danger{color:#ff9b9b;border-color:rgba(255,120,120,.4);}

  #toast{
    position:fixed;top:calc(58px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    background:rgba(255,255,255,.92);color:#15183a;font-size:12.5px;font-weight:600;
    padding:9px 16px;border-radius:999px;z-index:40;display:none;
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<header>
  <h1>バブル思考<small>頭に浮かんだことを、そのまま宙に浮かべておく。</small></h1>
  <button class="ghost" id="copyBtn">md</button>
  <button class="ghost" id="clearBtn">全消し</button>
</header>

<div id="empty">
  ここは整理しなくていい場所。<br>浮かんだら、そのまま置いていって。
</div>
<div id="board"></div>

<div class="dock">
  <input id="inp" type="text" placeholder="いま浮かんだこと" autocomplete="off" enterkeyhint="send">
  <button id="addBtn">浮かべる</button>
</div>

<div id="dim"></div>
<div id="sheet">
  <div class="full" id="sheetText"></div>
  <div class="when" id="sheetWhen"></div>
  <div class="pills" id="pills"></div>
  <div class="sheet-actions">
    <button class="danger" id="delOne">この子を消す</button>
    <button id="closeSheet">閉じる</button>
  </div>
</div>

<div id="toast"></div>

<script>
const KEY = "bubble-board-v0";
const CATS = [
  {id:"none",  label:"未分類",   color:"var(--c-none)"},
  {id:"neta",  label:"ネタ",     color:"var(--c-neta)"},
  {id:"task",  label:"タスク",   color:"var(--c-task)"},
  {id:"later", label:"後で",     color:"var(--c-later)"},
  {id:"tired", label:"しんどい", color:"var(--c-tired)"},
  {id:"imo",   label:"いも",     color:"var(--c-imo)"},
];
const catOf = id => CATS.find(c=>c.id===id) || CATS[0];

let bubbles = load();
let activeId = null;

function load(){
  try{ return JSON.parse(localStorage.getItem(KEY)) || []; }catch(e){ return []; }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(bubbles)); }catch(e){ toast("保存できない環境かも（プレビュー中？）"); }
}

/* 星空 */
(function(){
  const s = document.getElementById("stars");
  for(let i=0;i<40;i++){
    const st = document.createElement("i");
    st.style.left = Math.random()*100+"vw";
    st.style.top = Math.random()*100+"vh";
    st.style.animationDelay = (Math.random()*4)+"s";
    s.appendChild(st);
  }
})();

function fmt(ts){
  const d = new Date(ts);
  const z = n => String(n).padStart(2,"0");
  return `${z(d.getMonth()+1)}/${z(d.getDate())} ${z(d.getHours())}:${z(d.getMinutes())}`;
}

function addBubble(){
  const inp = document.getElementById("inp");
  const text = inp.value.trim();
  if(!text) return;
  bubbles.push({
    id: Date.now() + "" + Math.floor(Math.random()*999),
    text, cat:"none", ts: Date.now(),
    x: 6 + Math.random()*64,            // vw%
    y: 12 + Math.random()*58,           // vh%
    dur: (8 + Math.random()*6).toFixed(1),
    delay: (Math.random()*3).toFixed(1),
    dx: (Math.random()*16-8).toFixed(0),
    dy: (Math.random()*14-7).toFixed(0),
    born:true
  });
  save();
  render();
  inp.value = "";
  inp.focus();
}

function render(){
  const board = document.getElementById("board");
  board.innerHTML = "";
  document.getElementById("empty").style.display = bubbles.length ? "none" : "flex";
  for(const b of bubbles){
    const el = document.createElement("div");
    el.className = "bubble" + (b.born ? " born" : "");
    el.style.setProperty("--cat", catOf(b.cat).color);
    el.style.setProperty("--dur", b.dur+"s");
    el.style.setProperty("--delay", b.delay+"s");
    el.style.setProperty("--dx", b.dx+"px");
    el.style.setProperty("--dy", b.dy+"px");
    el.style.left = b.x+"vw";
    el.style.top = b.y+"vh";
    const short = b.text.length > 28 ? b.text.slice(0,28)+"…" : b.text;
    el.innerHTML = (b.cat!=="none" ? `<span class="tag">${catOf(b.cat).label}</span>` : "") +
                   `<span>${esc(short)}</span>`;
    el.onclick = () => openSheet(b.id);
    board.appendChild(el);
    b.born = false;
  }
}

function esc(s){ return s.replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

/* シート */
function openSheet(id){
  activeId = id;
  const b = bubbles.find(x=>x.id===id);
  if(!b) return;
  document.getElementById("sheetText").textContent = b.text;
  document.getElementById("sheetWhen").textContent = "浮かべた日時：" + fmt(b.ts);
  const pills = document.getElementById("pills");
  pills.innerHTML = "";
  for(const c of CATS){
    const p = document.createElement("button");
    p.className = "pill" + (b.cat===c.id ? " on" : "");
    p.style.setProperty("--cat", c.color);
    p.textContent = c.label;
    p.onclick = () => { b.cat = c.id; save(); render(); openSheet(id); };
    pills.appendChild(p);
  }
  document.getElementById("dim").style.display = "block";
  document.getElementById("sheet").style.display = "block";
}
function closeSheet(){
  document.getElementById("dim").style.display = "none";
  document.getElementById("sheet").style.display = "none";
  activeId = null;
}

/* Markdownコピー */
function toMarkdown(){
  const d = new Date();
  const z = n => String(n).padStart(2,"0");
  let md = `## 🫧 バブル思考 ${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}\n`;
  for(const c of CATS){
    const list = bubbles.filter(b=>b.cat===c.id);
    if(!list.length) continue;
    md += `\n### ${c.label}\n`;
    for(const b of list){
      md += (c.id==="task" ? `- [ ] ` : `- `) + b.text + `（${fmt(b.ts)}）\n`;
    }
  }
  return md;
}
async function copyMd(){
  if(!bubbles.length){ toast("まだ何も浮かんでないよ"); return; }
  const md = toMarkdown();
  try{
    await navigator.clipboard.writeText(md);
    toast("Markdownをコピーしました");
  }catch(e){
    const ta = document.createElement("textarea");
    ta.value = md; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy"); ta.remove();
    toast("Markdownをコピーしました");
  }
}

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(t._tm);
  t._tm = setTimeout(()=> t.style.display = "none", 1800);
}

/* イベント */
document.getElementById("addBtn").onclick = addBubble;
document.getElementById("inp").addEventListener("keydown", e => { if(e.key==="Enter") addBubble(); });
document.getElementById("copyBtn").onclick = copyMd;
document.getElementById("clearBtn").onclick = () => {
  if(!bubbles.length) return;
  if(confirm("ぜんぶ消します。コピーは済んでる？")){ bubbles = []; save(); render(); }
};
document.getElementById("delOne").onclick = () => {
  bubbles = bubbles.filter(b=>b.id!==activeId);
  save(); render(); closeSheet();
};
document.getElementById("closeSheet").onclick = closeSheet;
document.getElementById("dim").onclick = closeSheet;

render();
</script>
</body>
</html>
